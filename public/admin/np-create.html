<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUKSY — Створити ТТН</title>
<style>
* { margin:0; padding:0; box-sizing:border-box }
body { background:#0a0a0a; color:#e0e0e0; font-family:Arial,sans-serif; padding:40px 20px }
.container { max-width:700px; margin:0 auto }
h1 { color:#b10006; font-size:24px; margin-bottom:30px; text-align:center }
.card { background:#141414; border:1px solid rgba(255,255,255,0.06); padding:24px; margin-bottom:20px }
.card h2 { font-size:16px; color:#b10006; margin-bottom:16px; text-transform:uppercase; letter-spacing:.2em }
.row { display:grid; grid-template-columns:1fr 1fr; gap:12px }
.field { margin-bottom:12px }
.field label { display:block; font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:4px; text-transform:uppercase; letter-spacing:.1em }
.field input, .field select { width:100%; padding:10px 12px; background:#0a0a0a; border:1px solid rgba(255,255,255,0.1); color:#e0e0e0; font-size:14px; outline:none }
.field input:focus { border-color:#b10006 }
.btn { display:inline-block; padding:12px 32px; background:#b10006; color:#fff; border:none; font-size:14px; text-transform:uppercase; letter-spacing:.2em; cursor:pointer }
.btn:hover { background:#8a0005 }
.btn-block { width:100%; text-align:center }
.result { padding:16px; background:rgba(177,0,6,0.1); border:1px solid rgba(177,0,6,0.3); margin-top:16px }
.result code { font-size:28px; color:#b10006; font-weight:bold }
.error { padding:12px; background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.3); color:#ff4444; margin-bottom:16px; font-size:14px }
.success { padding:12px; background:rgba(0,200,0,0.1); border:1px solid rgba(0,200,0,0.3); color:#44ff44; margin-bottom:16px; font-size:14px }
.spinner { display:none; width:20px; height:20px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; margin:0 auto }
@keyframes spin { to { transform:rotate(360deg) } }
.warehouse-list { max-height:200px; overflow-y:auto }
.warehouse-item { padding:8px 12px; cursor:pointer; font-size:13px }
.warehouse-item:hover { background:rgba(177,0,6,0.1) }
.hint { font-size:11px; color:rgba(255,255,255,0.2); margin-top:4px }
.small { font-size:12px; color:rgba(255,255,255,0.3) }
</style>
</head>
<body>
<div class="container">
  <h1>📦 Нова Пошта — Створити ТТН</h1>

  <div id="msg"></div>

  <form id="ttnForm" autocomplete="off">

    <!-- Order -->
    <div class="card">
      <h2>Замовлення</h2>
      <div class="row">
        <div class="field">
          <label>Номер замовлення (BUK-xxxxxx)</label>
          <input type="text" id="orderId" placeholder="BUK-123456">
        </div>
        <div class="field">
          <label>Email клієнта</label>
          <input type="email" id="custEmail" placeholder="client@gmail.com">
        </div>
      </div>
      <div class="row">
        <div class="field">
          <label>Ім'я клієнта</label>
          <input type="text" id="custName" placeholder="Олександр">
        </div>
        <div class="field">
          <label>Телефон клієнта</label>
          <input type="text" id="custPhone" placeholder="+380955990719">
        </div>
      </div>
    </div>

    <!-- Sender -->
    <div class="card">
      <h2>Відправник (ти)</h2>
      <div class="row">
        <div class="field">
          <label>Місто-відправник</label>
          <input type="text" id="sCity" placeholder="Почни вводити...">
          <div id="sCityList" class="warehouse-list"></div>
          <input type="hidden" id="sCityRef">
        </div>
        <div class="field">
          <label>Телефон відправника</label>
          <input type="text" id="sPhone" placeholder="+380...">
        </div>
      </div>
      <div class="field">
        <label>Відділення / адреса</label>
        <select id="sAddress"><option value="">Спершу вибери місто</option></select>
        <input type="hidden" id="sAddressRef">
      </div>
      <div class="field">
        <label>Контактна особа</label>
        <input type="text" id="sContact" placeholder="BUKSY">
      </div>
    </div>

    <!-- Recipient -->
    <div class="card">
      <h2>Одержувач (клієнт)</h2>
      <div class="row">
        <div class="field">
          <label>Місто-одержувач</label>
          <input type="text" id="rCity" placeholder="Почни вводити...">
          <div id="rCityList" class="warehouse-list"></div>
          <input type="hidden" id="rCityRef">
        </div>
        <div class="field">
          <label>Відділення</label>
          <input type="text" id="rWh" placeholder="Спершу вибери місто">
          <div id="rWhList" class="warehouse-list"></div>
          <input type="hidden" id="rWhRef">
        </div>
      </div>
    </div>

    <!-- Cargo -->
    <div class="card">
      <h2>Вантаж</h2>
      <div class="row">
        <div class="field">
          <label>Опис</label>
          <input type="text" id="cDesc" placeholder="Лонгслив, худі...">
        </div>
        <div class="field">
          <label>Вага (кг)</label>
          <input type="number" id="cWeight" value="0.5" step="0.1" min="0.1">
        </div>
        <div class="field">
          <label>Оціночна вартість (грн)</label>
          <input type="number" id="cCost" value="500" min="0">
        </div>
        <div class="field">
          <label>Наложений платіж (грн, 0 = без)</label>
          <input type="number" id="cCod" value="500" min="0">
        </div>
      </div>
    </div>

    <button type="submit" class="btn btn-block" id="submitBtn">
      <span id="btnText">🚀 СТВОРИТИ ТТН</span>
      <span class="spinner" id="spinner"></span>
    </button>
  </form>

  <div id="result" style="display:none"></div>
</div>

<script>
var API = '/.netlify/functions/nova-poshta';

// Load saved sender data
try { var saved = JSON.parse(localStorage.getItem('np_sender')); if (saved) { document.getElementById('sPhone').value = saved.phone || ''; document.getElementById('sContact').value = saved.contact || ''; } } catch(e) {}

// City search for sender
document.getElementById('sCity').addEventListener('input', function() {
  var v = this.value.trim();
  if (v.length < 2) { document.getElementById('sCityList').innerHTML = ''; return; }
  fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'searchCity', city:v }) })
    .then(function(r) { return r.json() })
    .then(function(data) {
      var list = document.getElementById('sCityList');
      if (!Array.isArray(data) || !data.length) { list.innerHTML = '<div class="warehouse-item" style="color:#666">Не знайдено</div>'; return; }
      list.innerHTML = data.map(function(c, i) {
        return '<div class="warehouse-item" onclick="selectSCity(\'' + c.ref + '\', \'' + c.name.replace(/'/g,"\\'") + '\')">' + c.name + ' <span class="small">' + c.area + '</span></div>';
      }).join('');
    });
});

function selectSCity(ref, name) {
  document.getElementById('sCity').value = name;
  document.getElementById('sCityRef').value = ref;
  document.getElementById('sCityList').innerHTML = '';
  // Load warehouses
  fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'searchWarehouse', cityRef:ref }) })
    .then(function(r) { return r.json() })
    .then(function(data) {
      var sel = document.getElementById('sAddress');
      sel.innerHTML = '<option value="">Вибери відділення</option>';
      if (Array.isArray(data)) {
        data.forEach(function(w) {
          var opt = document.createElement('option');
          opt.value = w.ref;
          opt.textContent = w.number + ' — ' + (w.address || '');
          sel.appendChild(opt);
          localStorage.setItem('np_sender_city_ref', ref);
        });
      }
    });
}

document.getElementById('sAddress').addEventListener('change', function() {
  document.getElementById('sAddressRef').value = this.value;
});

// City search for recipient
document.getElementById('rCity').addEventListener('input', function() {
  var v = this.value.trim();
  if (v.length < 2) { document.getElementById('rCityList').innerHTML = ''; return; }
  fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'searchCity', city:v }) })
    .then(function(r) { return r.json() })
    .then(function(data) {
      var list = document.getElementById('rCityList');
      if (!Array.isArray(data) || !data.length) { list.innerHTML = '<div class="warehouse-item" style="color:#666">Не знайдено</div>'; return; }
      list.innerHTML = data.map(function(c) {
        return '<div class="warehouse-item" onclick="selectRCity(\'' + c.ref + '\', \'' + c.name.replace(/'/g,"\\'") + '\')">' + c.name + ' <span class="small">' + c.area + '</span></div>';
      }).join('');
    });
});

function selectRCity(ref, name) {
  document.getElementById('rCity').value = name;
  document.getElementById('rCityRef').value = ref;
  document.getElementById('rCityList').innerHTML = '';
  fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'searchWarehouse', cityRef:ref }) })
    .then(function(r) { return r.json() })
    .then(function(data) {
      var list = document.getElementById('rWhList');
      if (!Array.isArray(data) || !data.length) { list.innerHTML = '<div class="warehouse-item" style="color:#666">Не знайдено</div>'; return; }
      list.innerHTML = data.map(function(w) {
        return '<div class="warehouse-item" onclick="selectRWh(\'' + w.ref + '\', \'' + (w.number + ' — ' + (w.address||'')).replace(/'/g,"\\'") + '\')">' + w.number + ' — ' + (w.address||'') + '</div>';
      }).join('');
      document.getElementById('rWh').value = '';
    });
}

function selectRWh(ref, full) {
  document.getElementById('rWh').value = full;
  document.getElementById('rWhRef').value = ref;
  document.getElementById('rWhList').innerHTML = '';
}

// Submit
document.getElementById('ttnForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  var text = document.getElementById('btnText');
  var spin = document.getElementById('spinner');
  var msg = document.getElementById('msg');
  var res = document.getElementById('result');
  text.style.display = 'none';
  spin.style.display = 'block';
  msg.innerHTML = '';
  res.style.display = 'none';

  var payload = {
    action: 'create',
    orderId: document.getElementById('orderId').value.trim(),
    sender: {
      phone: document.getElementById('sPhone').value.trim(),
      cityRef: document.getElementById('sCityRef').value,
      addressRef: document.getElementById('sAddressRef').value,
      contactRef: document.getElementById('sContact').value.trim(),
    },
    recipient: {
      firstName: (document.getElementById('custName').value || 'Клієнт').split(' ')[0] || 'Клієнт',
      lastName: (document.getElementById('custName').value || '').split(' ').slice(1).join(' ') || '',
      phone: document.getElementById('custPhone').value.trim(),
      city: document.getElementById('rCity').value.trim(),
      warehouse: document.getElementById('rWhRef').value,
      email: document.getElementById('custEmail').value.trim(),
    },
    cargo: {
      description: document.getElementById('cDesc').value.trim(),
      weight: Number(document.getElementById('cWeight').value) || 1,
      cost: Number(document.getElementById('cCost').value) || 0,
      codAmount: Number(document.getElementById('cCod').value) || 0,
    }
  };

  // Save sender data
  localStorage.setItem('np_sender', JSON.stringify({ phone: payload.sender.phone, contact: payload.sender.contactRef }));

  fetch(API, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) })
    .then(function(r) { return r.json() })
    .then(function(data) {
      text.style.display = 'inline';
      spin.style.display = 'none';
      if (data.error) {
        msg.innerHTML = '<div class="error">' + data.error + '</div>';
      } else {
        msg.innerHTML = '<div class="success">✅ ТТН створено! Telegram + email надіслано.</div>';
        res.style.display = 'block';
        res.innerHTML = '<div class="result">ТТН: <code>' + data.ttn + '</code></div>';
      }
    })
    .catch(function(err) {
      text.style.display = 'inline';
      spin.style.display = 'none';
      msg.innerHTML = '<div class="error">Помилка з\'єднання</div>';
    });
});
</script>
</body>
</html>
